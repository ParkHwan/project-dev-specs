# hermes 설정 예시 — ~/.hermes/config.yaml 로 복사해 사용
#
# 모델 라우팅 (이 PoC):
#   - 메인(primary) = Claude via OpenRouter   → Orchestrator + Code Verifier
#   - 서브(subagent) = Codex (OpenAI 키 직접)  → Code Generator
#   - 서브(subagent) = Gemini (Google 키 직접) → Doc/Arch Reviewer
#   ※ Anthropic 직접 키는 사용하지 않는다. Claude는 OpenRouter로만 접근.
#
# 키는 ~/.hermes/.env 에 (커밋 금지):
#   OPENROUTER_API_KEY   # 메인 Claude
#   OPENAI_API_KEY       # 서브 Codex
#   GEMINI_API_KEY       # 서브 Gemini   # 확인 필요: hermes의 Google/Gemini provider 키 이름(GOOGLE_API_KEY일 수 있음)

# 메인 = Claude via OpenRouter (OpenRouter 모델 id 형식: "<provider>/<model>")
model:
  default: "anthropic/claude-opus-4-8"
  provider: "openrouter"

# 보조 작업(요약/압축 등)도 OpenRouter로 저비용 모델 사용
auxiliary:
  compression:
    provider: "openrouter"
    model: "anthropic/claude-haiku-4"

# ──────────────────────────────────────────────────────────────────────────
# 실험 결과(2026-06-16): 서브에이전트 역할별 모델 분리는 hermes 단독으로 불가.
#  - hermes 서브에이전트(delegate_task)는 메인 모델(Claude/OpenRouter)을 상속한다.
#    (실측: OpenAI 대시보드 무호출, OpenRouter에만 호출) → config의 subagents 모델 지정 없음.
#  - hermes의 "Codex 사용"은 모델 라우팅이 아니라 외부 codex CLI 셸아웃(tool-use)이라
#    Codex 자체 인증이 필요하고, 시크릿 마스킹/승인 게이트에 막힌다.
# ⇒ 결론: Generator≠Verifier는 ralph 래퍼(ralph_loop.sh)에서 per-invocation으로 보장한다.
#         ralph가 역할마다 `hermes -z "<프롬프트>" -m <모델> --provider openrouter` 로 호출.
#
# 모델은 모두 OpenRouter 경유(이 PoC):  # 확인 필요: 정확한 OpenRouter 모델 id
#   Generator = openai/gpt-5-codex (anthropic/claude-opus-4-8 와 다른 모델)
#   Verifier  = anthropic/claude-opus-4-8 (= 메인)
#   Doc Review = google/gemini-2.5-pro
# 참고: hermes의 OpenAI 키 슬롯은 STT/TTS용이라 GPT/Codex chat 생성엔 OpenRouter를 쓴다.
# ──────────────────────────────────────────────────────────────────────────
