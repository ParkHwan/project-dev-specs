# hermes 설정 예시 — ~/.hermes/config.yaml 로 복사해 사용
# API 키는 여기 두지 말고 ~/.hermes/.env 에 (ANTHROPIC_API_KEY / OPENAI_API_KEY / OPENROUTER_API_KEY)

# 주(primary) 모델 = Orchestrator + Code Verifier 역할 (예: Claude Opus)
model:
  default: "claude-opus-4"
  provider: "anthropic"
  # 커스텀/호환 엔드포인트가 필요하면:
  # base_url: "https://api.example.com/v1"

# 보조 작업 슬롯 — 공식 문서상 provider/model을 독립 지정 가능(vision/compression 등)
auxiliary:
  compression:
    provider: "anthropic"
    model: "claude-haiku-4"   # 요약/압축은 저비용 모델

# ──────────────────────────────────────────────────────────────────────────
# ⚠️ 핵심 미확정: "역할별 서브에이전트 모델 분리" (Generator ≠ Verifier)
# 아래는 *가설적* 설정이다. 공식 문서에 서브에이전트 모델 오버라이드 키가
# 명시되어 있지 않으므로, EXPERIMENT_role_model_separation.md 절차로 실측한다.
# 실제 키 이름/지원 여부는 hermes 버전에 맞춰 교체할 것.  # 확인 필요
# ──────────────────────────────────────────────────────────────────────────
# subagents:
#   code_generator:
#     provider: "openrouter"
#     model: "openai/gpt-5.3-codex"   # Generator = Codex 계열
#   # Verifier는 주 모델(Claude)을 사용 → Generator와 다른 모델 보장
#
# 대안: OpenRouter 단일 키로 모델만 호출별 전환(프레임워크 허용 시),
#       또는 검증 단계를 hermes 밖(ralph 래퍼)에서 별도 모델로 호출.

# Doc/Arch Reviewer(Gemini)는 핫 루프 밖에서 PR 시점에만 별도 호출(이 설정과 무관).
