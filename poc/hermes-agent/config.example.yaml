# hermes 설정 예시 — ~/.hermes/config.yaml 로 복사해 사용
#
# 모델 라우팅 (이 PoC):
#   - 메인(primary) = Claude via OpenRouter   → Orchestrator + Code Verifier
#   - 서브(subagent) = Codex (OpenAI 키 직접)  → Code Generator
#   - 서브(subagent) = Gemini (Google 키 직접) → Doc/Arch Reviewer
#   ※ Anthropic 직접 키는 사용하지 않는다. Claude는 OpenRouter로만 접근.
#
# 키는 ~/.hermes/.env 에 (커밋 금지):
#   OPENROUTER_API_KEY   # 메인 Claude
#   OPENAI_API_KEY       # 서브 Codex
#   GEMINI_API_KEY       # 서브 Gemini   # 확인 필요: hermes의 Google/Gemini provider 키 이름(GOOGLE_API_KEY일 수 있음)

# 메인 = Claude via OpenRouter (OpenRouter 모델 id 형식: "<provider>/<model>")
model:
  default: "anthropic/claude-opus-4-8"
  provider: "openrouter"

# 보조 작업(요약/압축 등)도 OpenRouter로 저비용 모델 사용
auxiliary:
  compression:
    provider: "openrouter"
    model: "anthropic/claude-haiku-4"

# ──────────────────────────────────────────────────────────────────────────
# ⚠️ 핵심 미확정: 서브에이전트 역할별 모델/프로바이더 분리
# 목표 매핑:
#   Code Generator   = Codex  → provider: openai,  key: OPENAI_API_KEY
#   Doc/Arch Reviewer = Gemini → provider: google,  key: GEMINI_API_KEY
#   Verifier         = 메인 Claude(OpenRouter)  ← Generator(Codex)와 다른 모델 보장
#
# 아래 subagents 블록의 키/지원 여부는 공식 문서에 미확정 → EXPERIMENT 문서로 실측.
# (서브에이전트가 메인 모델을 상속하면 분리 실패 → ralph 래퍼 대안)  # 확인 필요
# ──────────────────────────────────────────────────────────────────────────
# subagents:
#   code_generator:
#     provider: "openai"
#     model: "gpt-5.3-codex"        # 확인 필요: 실제 모델 id
#   doc_reviewer:
#     provider: "google"            # 확인 필요: hermes provider 식별자
#     model: "gemini-2.5-pro"       # 확인 필요: 실제 모델 id
#
# 대안: Codex/Gemini도 OpenRouter 단일 키로 호출하면(openai/..., google/...)
#       키 관리는 단순해지나, 사용자 요구(서브는 각자 직접 키)와는 다르다.
